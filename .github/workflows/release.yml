name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset-name: linux-amd64
            archive-ext: tar.gz
          - os: macos-15-intel
            asset-name: darwin-amd64
            archive-ext: tar.gz
          - os: macos-14
            asset-name: darwin-arm64
            archive-ext: tar.gz
          - os: windows-latest
            asset-name: windows-amd64
            archive-ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "*_tests.py"

      - name: Build executable
        run: pyinstaller fine-upgrade.spec --clean --noconfirm

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE_DIR="helm-fine-upgrade-${VERSION}-${{ matrix.asset-name }}"
          mkdir -p "${PACKAGE_DIR}/bin"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/fine-upgrade.exe "${PACKAGE_DIR}/bin/fine-upgrade.exe"
          else
            cp dist/fine-upgrade "${PACKAGE_DIR}/bin/fine-upgrade"
            chmod +x "${PACKAGE_DIR}/bin/fine-upgrade"
          fi
          cp README.md CHANGELOG.md LICENSE "${PACKAGE_DIR}/"
          cp -r docs "${PACKAGE_DIR}/docs"
          mkdir -p dist-release
          PACKAGE_DIR="${PACKAGE_DIR}" ARCHIVE_EXT="${{ matrix.archive-ext }}" python -c "import os, shutil; fmt = 'zip' if os.environ['ARCHIVE_EXT'] == 'zip' else 'gztar'; shutil.make_archive(os.path.join('dist-release', os.environ['PACKAGE_DIR']), fmt, root_dir='.', base_dir=os.environ['PACKAGE_DIR'])"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-fine-upgrade-${{ github.ref_name }}-${{ matrix.asset-name }}
          path: dist-release/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
