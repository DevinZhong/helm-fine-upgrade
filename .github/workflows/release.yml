name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset-name: linux-amd64
            archive-ext: tar.gz
          - os: macos-15-intel
            asset-name: darwin-amd64
            archive-ext: tar.gz
          - os: macos-14
            asset-name: darwin-arm64
            archive-ext: tar.gz
          - os: windows-latest
            asset-name: windows-amd64
            archive-ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify plugin version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          PLUGIN_VERSION=$(awk -F"'" '/^version:/ { print $2; exit }' plugin.yaml)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test -n "$PLUGIN_VERSION"
          test "$PLUGIN_VERSION" = "$TAG_VERSION"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "*_tests.py"

      - name: Build executable
        run: pyinstaller fine-upgrade.spec --clean --noconfirm

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PLUGIN_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_DIR="helm-fine-upgrade-${VERSION}-${{ matrix.asset-name }}"
          mkdir -p "${PACKAGE_DIR}/bin"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/fine-upgrade.exe "${PACKAGE_DIR}/bin/fine-upgrade.exe"
          else
            cp dist/fine-upgrade "${PACKAGE_DIR}/bin/fine-upgrade"
            chmod +x "${PACKAGE_DIR}/bin/fine-upgrade"
          fi
          cat > "${PACKAGE_DIR}/plugin.yaml" <<EOF
          name: fine-upgrade
          version: '${PLUGIN_VERSION}'
          usage: "A way for more controllable upgrading of Helm charts."
          description: |
            A Helm plugin for controlled upgrades, release-state inspection, and
            adoption of existing Kubernetes resources.

            This binary package bundles Python and project dependencies. It still
            requires helm and kubectl to be installed on the target machine.

            Run:

              helm fine-upgrade --help
          ignoreFlags: false
          platformCommand:
            - os: windows
              command: '\${HELM_PLUGIN_DIR}/bin/fine-upgrade.exe'
            - command: '\${HELM_PLUGIN_DIR}/bin/fine-upgrade'
          EOF
          python -c "from pathlib import Path; p=Path('${PACKAGE_DIR}')/'plugin.yaml'; p.write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in p.read_text().splitlines()) + '\n')"
          cp README.md CHANGELOG.md LICENSE "${PACKAGE_DIR}/"
          cp -r docs "${PACKAGE_DIR}/docs"
          mkdir -p dist-release
          PACKAGE_DIR="${PACKAGE_DIR}" ARCHIVE_EXT="${{ matrix.archive-ext }}" python -c "import os, shutil; fmt = 'zip' if os.environ['ARCHIVE_EXT'] == 'zip' else 'gztar'; shutil.make_archive(os.path.join('dist-release', os.environ['PACKAGE_DIR']), fmt, root_dir='.', base_dir=os.environ['PACKAGE_DIR'])"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-fine-upgrade-${{ github.ref_name }}-${{ matrix.asset-name }}
          path: dist-release/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist-release/*
          generate_release_notes: true
