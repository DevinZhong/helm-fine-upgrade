name: fine-upgrade
version: '1.6.0'
usage: "A way for more controllable upgrading of Helm charts."
description: |
  A Helm plugin for controlled upgrades, release-state inspection, and adoption
  of existing Kubernetes resources.

  Installing from the source repository downloads the matching standalone binary
  package from GitHub Releases for the current platform. The binary bundles
  Python and project dependencies, but still requires helm and kubectl.

  Developers can skip binary download with:

    HELM_FINE_UPGRADE_SKIP_BINARY_INSTALL=1 helm plugin install <path-or-url>

  Then install Python dependencies manually before running the plugin.

  Run: helm fine-upgrade --help

ignoreFlags: false
platformCommand:
  - os: windows
    command: powershell.exe
    args:
      - -NoProfile
      - -ExecutionPolicy
      - Bypass
      - -File
      - ${HELM_PLUGIN_DIR}\scripts\run.ps1
  - command: ${HELM_PLUGIN_DIR}/scripts/run.sh
platformHooks:
  install:
    - os: windows
      command: powershell.exe
      args:
        - -NoProfile
        - -ExecutionPolicy
        - Bypass
        - -File
        - ${HELM_PLUGIN_DIR}\scripts\install.ps1
    - command: ${HELM_PLUGIN_DIR}/scripts/install.sh
  update:
    - os: windows
      command: powershell.exe
      args:
        - -NoProfile
        - -ExecutionPolicy
        - Bypass
        - -File
        - ${HELM_PLUGIN_DIR}\scripts\install.ps1
        - -Update
    - command: ${HELM_PLUGIN_DIR}/scripts/install.sh
      args:
        - --update
