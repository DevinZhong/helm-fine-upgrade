apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.labels.app | quote }}
spec:
  selector:
    app: {{ .Values.labels.app | quote }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 80
